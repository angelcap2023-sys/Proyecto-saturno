<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorando Saturno</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="stars"></canvas>

<h1>🪐 EXPLORANDO SATURNO</h1>
<div id="saturno3d"></div>

<div class="container">

<div class="orbit">

<div class="moon-orbit orbit1">
<div class="moon titan"></div>
</div>

<div class="moon-orbit orbit2">
<div class="moon encelado"></div>
</div>

<div class="ring"></div>
<div class="planet"></div>

</div>

<div class="menu">
<button onclick="mostrarInfo('saturno')">¿Qué es Saturno?</button>
<button onclick="mostrarInfo('anillos')">Anillos</button>
<button onclick="mostrarInfo('titan')">Titán</button>
<button onclick="mostrarInfo('curiosidades')">Curiosidades</button>
</div>

<div class="info" id="info">
Selecciona una opción para aprender más.
</div>

<div class="quiz">
<h2>🎯 Quiz</h2>

<p>¿Cuál es la luna más grande de Saturno?</p>

<button onclick="respuesta(true)">Titán</button>
<button onclick="respuesta(false)">Europa</button>
<button onclick="respuesta(false)">Fobos</button>

<p id="resultado"></p>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script src="script.js"></script>

</body>
</html>
